services:
  db:
    image: postgres:17
    container_name: predictops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: predictops
    ports:
      - "5433:5432"
    volumes:
      - predictops_postgres_data:/var/lib/postgresql/data
  

  api:
    build: .
    container_name: predictops-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  prometheus:
    image: prom/prometheus
    container_name: predictops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
  
  grafana:
    image: grafana/grafana
    container_name: predictops-grafana
    ports:
      - "3000:3000"
    volumes:
      - predictops_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus  

volumes:
  predictops_postgres_data:
  predictops_grafana_data:
