services:
  db:
    image: postgres:17
    container_name: predictops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: predictops
    ports:
      - "5433:5432"
    volumes:
      - predictops_postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: predictops-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  predictops_postgres_data:
