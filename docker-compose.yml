services:
  db:
    image: postgres:17
    container_name: predictops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: predictops
    ports:
      - "5433:5432"
    volumes:
      - predictops_postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: predictops-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  prometheus:
    image: prom/prometheus
    container_name: predictops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    container_name: predictops-grafana
    ports:
      - "3000:3000"
    volumes:
      - predictops_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  airflow:
    image: apache/airflow:2.10.5
    container_name: predictops-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: predictops_secret_key
      AIRFLOW_ADMIN_USERNAME: admin
      AIRFLOW_ADMIN_PASSWORD: admin
      AIRFLOW_ADMIN_FIRSTNAME: PredictOps
      AIRFLOW_ADMIN_LASTNAME: Admin
      AIRFLOW_ADMIN_EMAIL: admin@example.com
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_data:/opt/airflow
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname PredictOps
      --lastname Admin
      --role Admin
      --email admin@example.com || true &&
      airflow standalone
      "
    depends_on:
      - api

volumes:
  predictops_postgres_data:
  predictops_grafana_data:
  airflow_data:
